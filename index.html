<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>我的宝藏收藏 · 导航地图</title>
    <!-- 使用你仓库中的 favicon 图标 -->
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/JYForever/my-nav/main/favicon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 背景图片 - 使用你 GitHub 上的 bg.jpg 直链 */
        body {
            background-image: url('https://raw.githubusercontent.com/JYForever/my-nav/main/bg.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            padding: 2rem 1.5rem 3rem;
            color: #1f2d3d;
            position: relative;
        }

        /* 半透明白色遮罩，让文字更清晰 */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.85);
            z-index: -1;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* 头部 */
        .header {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .header h1 {
            font-size: 2rem;
            font-weight: 600;
            background: linear-gradient(135deg, #1e4a3b, #1a4c6e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .sub {
            color: #2d4a6e;
            margin-top: 0.5rem;
            font-size: 0.9rem;
            background: rgba(255,255,240,0.3);
            backdrop-filter: blur(2px);
            border-radius: 30px;
            padding: 4px 16px;
            display: inline-block;
        }

        /* 工具栏：搜索 + 按钮 */
        .toolbar {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .search-box {
            display: flex;
            background: rgba(255,255,255,0.9);
            border-radius: 40px;
            padding: 5px 15px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.6);
            width: 260px;
        }
        .search-box input {
            background: transparent;
            border: none;
            padding: 8px 0;
            font-size: 0.9rem;
            width: 100%;
            outline: none;
        }
        .search-box span {
            color: #6c86a3;
            padding-right: 8px;
        }
        .btn {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(4px);
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .btn:hover {
            background: white;
            transform: translateY(-2px);
        }
        .btn-add {
            background: linear-gradient(135deg, #2d6a4f, #1e6091);
            color: white;
        }
        .btn-reset {
            background: rgba(200,70,70,0.9);
            color: white;
        }

        /* 卡片网格 */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            transition: 0.2s;
            border: 1px solid rgba(255,255,255,0.5);
        }
        .card:hover {
            transform: translateY(-3px);
            background: rgba(255,255,255,0.96);
        }
        .card-header {
            background: rgba(248,250,252,0.7);
            padding: 0.8rem 1.2rem;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card-header h2 {
            font-size: 1.2rem;
            font-weight: 600;
            color: #1f3b4c;
        }
        .badge {
            background: rgba(0,0,0,0.08);
            padding: 2px 10px;
            border-radius: 30px;
            font-size: 0.7rem;
        }
        .link-list {
            padding: 0.5rem 0.25rem 0.75rem;
            max-height: 400px;
            overflow-y: auto;
        }
        .link-item {
            display: flex;
            align-items: center;
            padding: 0.5rem 1rem;
            margin: 0.2rem 0.5rem;
            border-radius: 14px;
            text-decoration: none;
            color: #1e2f3e;
            font-size: 0.9rem;
            transition: 0.2s;
            background: rgba(255,255,255,0.3);
        }
        .link-item:hover {
            background: rgba(255,255,255,0.9);
            transform: translateX(4px);
        }
        .link-icon {
            width: 28px;
            font-size: 1.2rem;
            margin-right: 12px;
            text-align: center;
        }
        .link-name {
            flex: 1;
            font-weight: 500;
        }
        .link-url {
            font-size: 0.7rem;
            color: #5c7a9a;
            max-width: 160px;
            text-align: right;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .delete-link {
            opacity: 0;
            background: none;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            color: #b91c1c;
            transition: 0.2s;
            margin-left: 8px;
        }
        .link-item:hover .delete-link {
            opacity: 1;
        }

        /* 添加链接的弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 28px;
            padding: 1.8rem;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.2);
        }
        .modal-content h3 {
            margin-bottom: 1rem;
        }
        .modal-content input, .modal-content select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 40px;
            font-size: 0.9rem;
        }
        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 1rem;
        }
        .footer {
            text-align: center;
            margin-top: 2rem;
            padding: 0.6rem;
            font-size: 0.75rem;
            color: #4a627a;
        }
        @media (max-width: 720px) {
            body { padding: 1rem; }
            .link-url { display: none; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📚 我的宝藏收藏 · 导航地图</h1>
        <div class="sub">⚡ 常用网站 · 清爽直达</div>
    </div>

    <div class="toolbar">
        <div class="search-box">
            <span>🔍</span>
            <input type="text" id="searchInput" placeholder="搜索网站名称或网址...">
        </div>
        <button class="btn btn-add" id="openModalBtn">➕ 添加链接</button>
        <button class="btn btn-reset" id="resetBtn">🔄 重置默认</button>
    </div>

    <div id="cardsContainer" class="grid"></div>
    <div class="footer">🧭 导航地图 · 收藏即捷径</div>
</div>

<!-- 添加链接弹窗 -->
<div id="addModal" class="modal">
    <div class="modal-content">
        <h3>➕ 添加新链接</h3>
        <input type="text" id="linkName" placeholder="网站名称 (例如: 哔哩哔哩)" autocomplete="off">
        <input type="text" id="linkUrl" placeholder="网址 (例如: https://bilibili.com)" autocomplete="off">
        <select id="linkCategory">
            <option value="网盘">☁️ 网盘</option>
            <option value="邮箱">📧 邮箱</option>
            <option value="社交">💬 社交</option>
            <option value="国际社交">🌍 国际社交</option>
            <option value="浏览器">🌐 浏览器</option>
            <option value="地图">🗺️ 地图</option>
            <option value="其他">📌 其他</option>
        </select>
        <div class="modal-buttons">
            <button class="btn" id="closeModalBtn">取消</button>
            <button class="btn btn-add" id="saveLinkBtn">保存</button>
        </div>
    </div>
</div>

<script>
    // ---------- 默认数据（与之前截图一致）----------
    const DEFAULT_CATEGORIES = {
        "网盘": [
            { name: "百度网盘", url: "https://pan.baidu.com", icon: "📀" },
            { name: "阿里云盘", url: "https://www.aliyundrive.com", icon: "☁️" },
            { name: "腾讯微云", url: "https://www.weiyun.com", icon: "🐧" },
            { name: "夸克网盘", url: "https://pan.quark.cn", icon: "⚛️" },
            { name: "迅雷云盘", url: "https://pan.xunlei.com", icon: "⚡" },
            { name: "123云盘", url: "https://www.123pan.com", icon: "🔢" }
        ],
        "邮箱": [
            { name: "QQ邮箱", url: "https://mail.qq.com", icon: "📧" },
            { name: "163邮箱", url: "https://mail.163.com", icon: "📬" },
            { name: "Outlook邮箱", url: "https://outlook.live.com", icon: "🌐" }
        ],
        "社交": [
            { name: "微信", url: "https://weixin.qq.com", icon: "💬" },
            { name: "QQ", url: "https://im.qq.com", icon: "🐧" },
            { name: "微博", url: "https://weibo.com", icon: "📱" },
            { name: "小红书", url: "https://www.xiaohongshu.com", icon: "📕" }
        ],
        "国际社交": [
            { name: "YouTube", url: "https://www.youtube.com", icon: "📺" },
            { name: "Instagram", url: "https://www.instagram.com", icon: "📷" },
            { name: "X (Twitter)", url: "https://twitter.com", icon: "🐦" },
            { name: "TikTok", url: "https://www.tiktok.com", icon: "🎵" }
        ],
        "浏览器": [
            { name: "Chrome", url: "https://www.google.cn/chrome/", icon: "🌐" },
            { name: "Edge", url: "https://www.microsoft.com/zh-cn/edge", icon: "🔷" },
            { name: "Firefox", url: "https://www.mozilla.org/zh-CN/firefox/", icon: "🦊" },
            { name: "QQ浏览器", url: "https://browser.qq.com", icon: "🐧" },
            { name: "360极速浏览器", url: "https://browser.360.cn/ee/", icon: "🛡️" },
            { name: "搜狗浏览器", url: "https://ie.sogou.com", icon: "🔍" },
            { name: "Safari", url: "https://www.apple.com/safari/", icon: "🍏" }
        ],
        "地图": [
            { name: "百度地图", url: "https://map.baidu.com", icon: "📍" },
            { name: "高德地图", url: "https://ditu.amap.com", icon: "🗺️" },
            { name: "腾讯地图", url: "https://map.qq.com", icon: "🧭" }
        ],
        "其他": [
            { name: "阿里巴巴图标库", url: "https://www.iconfont.cn", icon: "✨" }
        ]
    };

    // 本地存储 key
    const STORAGE_KEY = "myNavLinks";

    // 当前数据（可变）
    let categoriesData = {};

    // 加载数据
    function loadData() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
            try {
                categoriesData = JSON.parse(stored);
                // 确保所有默认分类都存在（防止旧数据缺失分类）
                for (let cat in DEFAULT_CATEGORIES) {
                    if (!categoriesData[cat]) categoriesData[cat] = [];
                }
            } catch(e) { console.error(e); }
        } else {
            // 深拷贝默认数据
            categoriesData = JSON.parse(JSON.stringify(DEFAULT_CATEGORIES));
        }
    }

    function saveData() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(categoriesData));
    }

    // 重置为默认
    function resetToDefault() {
        categoriesData = JSON.parse(JSON.stringify(DEFAULT_CATEGORIES));
        saveData();
        renderAllCards("");
    }

    // 添加新链接
    function addLink(name, url, category) {
        if (!name || !url) return false;
        if (!url.startsWith("http")) url = "https://" + url;
        const newLink = { name: name, url: url, icon: "🔗" };
        if (!categoriesData[category]) categoriesData[category] = [];
        categoriesData[category].push(newLink);
        saveData();
        return true;
    }

    // 删除链接
    function deleteLink(category, index) {
        if (categoriesData[category] && categoriesData[category][index]) {
            categoriesData[category].splice(index, 1);
            saveData();
            renderAllCards(document.getElementById("searchInput").value);
        }
    }

    // 渲染卡片（支持搜索过滤）
    function renderAllCards(searchKeyword) {
        const container = document.getElementById("cardsContainer");
        container.innerHTML = "";
        const keyword = (searchKeyword || "").trim().toLowerCase();
        
        // 对每个分类进行过滤
        for (let catName in categoriesData) {
            let links = categoriesData[catName];
            if (!links || links.length === 0) continue;
            
            // 过滤链接
            let filteredLinks = links;
            if (keyword) {
                filteredLinks = links.filter(link => 
                    link.name.toLowerCase().includes(keyword) || 
                    link.url.toLowerCase().includes(keyword)
                );
            }
            if (filteredLinks.length === 0) continue;
            
            // 创建卡片
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
                <div class="card-header">
                    <h2>${catName === "网盘" ? "☁️" : catName === "邮箱" ? "📧" : catName === "社交" ? "💬" : catName === "国际社交" ? "🌍" : catName === "浏览器" ? "🌐" : catName === "地图" ? "🗺️" : "📌"} ${catName}</h2>
                    <span class="badge">${filteredLinks.length}个链接</span>
                </div>
                <div class="link-list" data-category="${catName}"></div>
            `;
            const linkListDiv = card.querySelector(".link-list");
            filteredLinks.forEach((link, idx) => {
                // 找到在原数组中的真实索引（用于删除）
                const originalIndex = links.findIndex(l => l.name === link.name && l.url === link.url);
                const linkDiv = document.createElement("a");
                linkDiv.className = "link-item";
                linkDiv.href = link.url;
                linkDiv.target = "_blank";
                linkDiv.rel = "noopener noreferrer";
                linkDiv.innerHTML = `
                    <span class="link-icon">${link.icon || "🔗"}</span>
                    <span class="link-name">${escapeHtml(link.name)}</span>
                    <span class="link-url">${escapeHtml(link.url.replace(/^https?:\/\//, ''))}</span>
                    <button class="delete-link" data-category="${catName}" data-index="${originalIndex}" onclick="event.preventDefault(); event.stopPropagation(); deleteLink('${catName}', ${originalIndex}); return false;">🗑️</button>
                `;
                linkListDiv.appendChild(linkDiv);
            });
            container.appendChild(card);
        }
        if (container.children.length === 0) {
            container.innerHTML = "<div style='text-align:center; padding:2rem;'>😢 没有找到相关链接</div>";
        }
    }

    // 简单防XSS
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // 监听搜索
    function initSearch() {
        const input = document.getElementById("searchInput");
        input.addEventListener("input", (e) => {
            renderAllCards(e.target.value);
        });
    }

    // 弹窗逻辑
    let modal = null;
    function initModal() {
        modal = document.getElementById("addModal");
        const openBtn = document.getElementById("openModalBtn");
        const closeBtn = document.getElementById("closeModalBtn");
        const saveBtn = document.getElementById("saveLinkBtn");
        openBtn.onclick = () => { modal.style.display = "flex"; };
        closeBtn.onclick = () => { modal.style.display = "none"; };
        saveBtn.onclick = () => {
            const name = document.getElementById("linkName").value.trim();
            let url = document.getElementById("linkUrl").value.trim();
            const category = document.getElementById("linkCategory").value;
            if (!name || !url) {
                alert("请填写名称和网址");
                return;
            }
            if (addLink(name, url, category)) {
                modal.style.display = "none";
                document.getElementById("linkName").value = "";
                document.getElementById("linkUrl").value = "";
                renderAllCards(document.getElementById("searchInput").value);
            } else {
                alert("添加失败");
            }
        };
        window.onclick = (e) => { if (e.target === modal) modal.style.display = "none"; };
    }

    // 重置按钮
    function initReset() {
        document.getElementById("resetBtn").onclick = () => {
            if (confirm("重置会清空所有你添加的链接，恢复默认。确定吗？")) {
                resetToDefault();
                document.getElementById("searchInput").value = "";
            }
        };
    }

    // 初始化
    function init() {
        loadData();
        initSearch();
        initModal();
        initReset();
        renderAllCards("");
    }

    init();
</script>
</body>
</html>
