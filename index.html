<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的宝藏收藏</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: url('bg.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: system-ui, sans-serif;
            padding: 40px 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 2rem; color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .header p { color: rgba(255,255,255,0.8); }
        .search-box { max-width: 400px; margin: 0 auto 30px; }
        .search-box input { width: 100%; padding: 10px 18px; border-radius: 40px; border: none; outline: none; }
        .toolbar { display: flex; justify-content: flex-end; gap: 12px; margin-bottom: 24px; }
        .toolbar button { padding: 8px 18px; border: none; border-radius: 30px; cursor: pointer; font-weight: 500; }
        .btn-add-cat { background: #8b5cf6; color: white; }
        .btn-add { background: #3b82f6; color: white; }
        .btn-save { background: #10b981; color: white; }
        .btn-refresh { background: #6b7280; color: white; }
        .category {
            background: rgba(255,255,255,0.92);
            border-radius: 20px;
            padding: 18px 22px;
            margin-bottom: 22px;
        }
        .category h2 {
            font-size: 1.2rem;
            margin-bottom: 14px;
            display: flex;
            justify-content: space-between;
        }
        .cat-actions button { background: rgba(0,0,0,0.05); border: none; cursor: pointer; padding: 4px 10px; border-radius: 20px; margin-left: 8px; }
        .link-list { display: flex; flex-direction: column; gap: 6px; }
        .link-item {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            background: rgba(255,255,255,0.6);
            border-radius: 12px;
            cursor: pointer;
        }
        .link-name { flex: 1; }
        .link-url { font-size: 0.7rem; color: #666; margin-right: 12px; }
        .link-actions button { background: none; border: none; cursor: pointer; padding: 4px 8px; }
        .btn-edit { color: #3b82f6; }
        .btn-del { color: #ef4444; }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            border-radius: 28px;
            padding: 28px;
            width: 90%;
            max-width: 400px;
        }
        .modal-content input, .modal-content select {
            width: 100%;
            padding: 12px;
            margin-bottom: 16px;
            border: 1px solid #ddd;
            border-radius: 16px;
        }
        .modal-buttons { display: flex; gap: 12px; justify-content: flex-end; }
        .modal-buttons button { padding: 8px 18px; border: none; border-radius: 30px; cursor: pointer; }
        .loading { text-align: center; padding: 60px; color: white; }
        .footer { text-align: center; margin-top: 40px; color: rgba(255,255,255,0.7); }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>⭐ 我的宝藏收藏</h1>
        <p>云端同步</p>
    </div>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="搜索..." onkeyup="filterLinks()">
    </div>
    <div class="toolbar">
        <button class="btn-refresh" onclick="loadData()">刷新</button>
        <button class="btn-add-cat" onclick="openAddCategory()">添加分类</button>
        <button class="btn-add" onclick="openAddLink()">添加链接</button>
        <button class="btn-save" onclick="saveData()">保存</button>
    </div>
    <div id="categoriesContainer"><div class="loading">加载中...</div></div>
    <div class="footer">修改后点「保存」</div>
</div>

<script>
    const SUPABASE_URL = 'https://wsdjhroznnezwwhrbrrz.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndzZGpocm96bm5lenp3d2hyYnJyeiIsInJvbGUiOiJhbm9uIiwiaWF0IjoxNzQ0ODgzNTUxLCJleHAiOjIwNjA0NTk1NTF9.7hr_K9Kq3-PLQvJuUv6nDZP5Yqj0Z8sRcV2QnH7xZ1E';

    let categories = [];
    let linksData = {};
    let modalType = '';
    let editOldCat = '';
    let editLinkCat = '';
    let editLinkIdx = -1;

    async function loadData() {
        document.getElementById('categoriesContainer').innerHTML = '<div class="loading">加载中...</div>';
        try {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/nav_data?select=*`, {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
            });
            const data = await res.json();
            if (data && data[0] && data[0].data) {
                categories = data[0].data.categories || [];
                linksData = data[0].data.linksData || {};
            } else {
                categories = [{ name: "在线视频", icon: "🎬" }];
                linksData = { "在线视频": [] };
            }
            render();
        } catch(e) {
            console.error(e);
            document.getElementById('categoriesContainer').innerHTML = '<div class="loading">加载失败</div>';
        }
    }

    async function saveData() {
        const toSave = { categories, linksData };
        try {
            const check = await fetch(`${SUPABASE_URL}/rest/v1/nav_data?select=id`, {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
            });
            const existing = await check.json();
            if (existing && existing[0]) {
                await fetch(`${SUPABASE_URL}/rest/v1/nav_data?id=eq.${existing[0].id}`, {
                    method: 'PATCH',
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: toSave })
                });
            } else {
                await fetch(`${SUPABASE_URL}/rest/v1/nav_data`, {
                    method: 'POST',
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: toSave })
                });
            }
            alert('保存成功！');
        } catch(e) {
            alert('保存失败：' + e.message);
        }
    }

    function render() {
        const container = document.getElementById('categoriesContainer');
        container.innerHTML = '';
        categories.forEach(cat => {
            const links = linksData[cat.name] || [];
            let linksHtml = '';
            links.forEach((link, idx) => {
                linksHtml += `
                    <div class="link-item" onclick="window.open('${link.url}', '_blank')">
                        <span class="link-name">${link.icon || '🔗'} ${link.name}</span>
                        <span class="link-url">${link.url}</span>
                        <div class="link-actions" onclick="event.stopPropagation()">
                            <button class="btn-edit" onclick="editLink('${cat.name}', ${idx})">编辑</button>
                            <button class="btn-del" onclick="deleteLink('${cat.name}', ${idx})">删除</button>
                        </div>
                    </div>
                `;
            });
            if (links.length === 0) linksHtml = '<div style="padding:12px;">暂无链接，点击➕添加</div>';
            container.innerHTML += `
                <div class="category">
                    <h2>
                        <span>${cat.icon} ${cat.name}</span>
                        <div class="cat-actions">
                            <button onclick="renameCategory('${cat.name}')">重命名</button>
                            <button onclick="addLinkToCat('${cat.name}')">➕</button>
                            <button onclick="deleteCategory('${cat.name}')">删除</button>
                        </div>
                    </h2>
                    <div class="link-list">${linksHtml}</div>
                </div>
            `;
        });
        if (categories.length === 0) container.innerHTML = '<div style="text-align:center; padding:60px;">暂无分类，点击「添加分类」</div>';
        filterLinks();
    }

    function openAddCategory() {
        modalType = 'addCategory';
        document.getElementById('catName').value = '';
        document.getElementById('catIcon').value = '📁';
        document.getElementById('categoryModal').style.display = 'flex';
    }

    function renameCategory(name) {
        modalType = 'renameCategory';
        editOldCat = name;
        document.getElementById('catName').value = name;
        document.getElementById('catIcon').value = categories.find(c => c.name === name)?.icon || '📁';
        document.getElementById('categoryModal').style.display = 'flex';
    }

    function deleteCategory(name) {
        if (confirm(`删除「${name}」？`)) {
            categories = categories.filter(c => c.name !== name);
            delete linksData[name];
            render();
        }
    }

    function confirmCategory() {
        const newName = document.getElementById('catName').value.trim();
        const icon = document.getElementById('catIcon').value.trim() || '📁';
        if (!newName) return;
        if (modalType === 'addCategory') {
            categories.push({ name: newName, icon });
            if (!linksData[newName]) linksData[newName] = [];
        } else {
            const cat = categories.find(c => c.name === editOldCat);
            if (cat) cat.name = newName;
            if (editOldCat !== newName) {
                linksData[newName] = linksData[editOldCat] || [];
                delete linksData[editOldCat];
            }
        }
        closeModal('categoryModal');
        render();
    }

    function openAddLink() {
        modalType = 'addLink';
        document.getElementById('linkName').value = '';
        document.getElementById('linkUrl').value = '';
        updateCatSelect();
        document.getElementById('linkModal').style.display = 'flex';
    }

    function addLinkToCat(catName) {
        modalType = 'addLink';
        document.getElementById('linkName').value = '';
        document.getElementById('linkUrl').value = '';
        updateCatSelect(catName);
        document.getElementById('linkModal').style.display = 'flex';
    }

    function editLink(catName, idx) {
        const link = linksData[catName][idx];
        modalType = 'editLink';
        editLinkCat = catName;
        editLinkIdx = idx;
        document.getElementById('linkName').value = link.name;
        document.getElementById('linkUrl').value = link.url;
        updateCatSelect(catName);
        document.getElementById('linkModal').style.display = 'flex';
    }

    function deleteLink(catName, idx) {
        if (confirm('删除？')) {
            linksData[catName].splice(idx, 1);
            render();
        }
    }

    function updateCatSelect(selected = null) {
        const select = document.getElementById('linkCategory');
        select.innerHTML = categories.map(c => `<option value="${c.name}" ${selected === c.name ? 'selected' : ''}>${c.icon} ${c.name}</option>`).join('');
    }

    function confirmLink() {
        const name = document.getElementById('linkName').value.trim();
        let url = document.getElementById('linkUrl').value.trim();
        const catName = document.getElementById('linkCategory').value;
        if (!name || !url) return;
        if (!url.startsWith('http')) url = 'https://' + url;
        if (modalType === 'addLink') {
            if (!linksData[catName]) linksData[catName] = [];
            linksData[catName].push({ name, url, icon: '🔗' });
        } else {
            if (editLinkCat === catName) {
                linksData[catName][editLinkIdx] = { name, url, icon: '🔗' };
            } else {
                linksData[editLinkCat].splice(editLinkIdx, 1);
                if (!linksData[catName]) linksData[catName] = [];
                linksData[catName].push({ name, url, icon: '🔗' });
            }
        }
        closeModal('linkModal');
        render();
    }

    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function filterLinks() {
        const kw = document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('.category').forEach(cat => {
            let show = false;
            cat.querySelectorAll('.link-item').forEach(item => {
                const match = item.innerText.toLowerCase().includes(kw);
                item.style.display = match ? 'flex' : 'none';
                if (match) show = true;
            });
            cat.style.display = show ? 'block' : 'none';
        });
    }
    window.onclick = e => { if (e.target.classList?.contains('modal')) e.target.style.display = 'none'; };
    loadData();
</script>

<div id="linkModal" class="modal">
    <div class="modal-content">
        <h3>链接</h3>
        <input type="text" id="linkName" placeholder="名称">
        <input type="text" id="linkUrl" placeholder="网址">
        <select id="linkCategory"></select>
        <div class="modal-buttons">
            <button onclick="closeModal('linkModal')">取消</button>
            <button onclick="confirmLink()">确认</button>
        </div>
    </div>
</div>

<div id="categoryModal" class="modal">
    <div class="modal-content">
        <h3>分类</h3>
        <input type="text" id="catName" placeholder="分类名称">
        <input type="text" id="catIcon" placeholder="图标" value="📁">
        <div class="modal-buttons">
            <button onclick="closeModal('categoryModal')">取消</button>
            <button onclick="confirmCategory()">确认</button>
        </div>
    </div>
</div>
</body>
</html>
