<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>导航地图 · 我的收藏</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/JYForever/my-nav/main/favicon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 背景图完全显示，没有任何覆盖层 */
        body {
            background-image: url('https://raw.githubusercontent.com/JYForever/my-nav/main/bg.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            padding: 2rem 1.5rem 3rem;
            color: #1f2d3d;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* 头部（只保留副标题） */
        .header {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .sub {
            color: #1e3a4d;
            margin-top: 0.5rem;
            font-size: 0.9rem;
            background: rgba(255,255,240,0.5);
            backdrop-filter: blur(4px);
            border-radius: 30px;
            padding: 4px 16px;
            display: inline-block;
            font-weight: 500;
        }

        /* 工具栏 */
        .toolbar {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .search-box {
            display: flex;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 5px 15px;
            border: 1px solid rgba(255,255,255,0.8);
            width: 260px;
        }
        .search-box input {
            background: transparent;
            border: none;
            padding: 8px 0;
            font-size: 0.9rem;
            width: 100%;
            outline: none;
        }
        .search-box span {
            color: #4a627a;
            padding-right: 8px;
        }
        .btn {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(8px);
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        .btn:hover {
            background: white;
            transform: translateY(-2px);
        }
        .btn-add {
            background: linear-gradient(135deg, #2d6a4f, #1e6091);
            color: white;
        }

        /* 卡片网格 */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        /* 卡片基础样式：透明毛玻璃，保留原有边框，左右边框颜色将在js中动态设置 */
        .card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            transition: 0.2s;
            border: 1px solid rgba(255,255,255,0.5);
            /* 左右边框宽度、颜色将在js中覆盖 */
            border-left-width: 4px;
            border-right-width: 2px;
        }
        .card:hover {
            transform: translateY(-3px);
            background: rgba(255,255,255,0.85);
        }

        .card-header {
            background: rgba(248,250,252,0.6);
            padding: 0.8rem 1.2rem;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }
        .card-header h2 {
            font-size: 1.2rem;
            font-weight: 600;
            color: #1f3b4c;
        }
        .badge {
            background: rgba(0,0,0,0.1);
            padding: 2px 10px;
            border-radius: 30px;
            font-size: 0.7rem;
        }
        .delete-category {
            background: none;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            color: #b91c1c;
            opacity: 0.6;
            margin-left: 8px;
        }
        .delete-category:hover {
            opacity: 1;
        }
        .collapse-icon {
            margin-right: 8px;
            font-size: 0.9rem;
            display: inline-block;
            transition: transform 0.2s;
        }
        .link-list {
            padding: 0.5rem 0.25rem 0.75rem;
            max-height: 400px;
            overflow-y: auto;
            transition: all 0.2s;
        }
        .link-list.collapsed {
            display: none;
        }
        .link-item {
            display: flex;
            align-items: center;
            padding: 0.5rem 1rem;
            margin: 0.2rem 0.5rem;
            border-radius: 14px;
            text-decoration: none;
            color: #1e2f3e;
            font-size: 0.9rem;
            transition: 0.2s;
            background: rgba(255,255,255,0.4);
        }
        .link-item:hover {
            background: rgba(255,255,255,0.9);
            transform: translateX(4px);
        }
        .link-icon {
            width: 28px;
            font-size: 1.2rem;
            margin-right: 12px;
            text-align: center;
        }
        .link-name {
            flex: 1;
            font-weight: 500;
        }
        .link-url {
            font-size: 0.7rem;
            color: #4a627a;
            max-width: 160px;
            text-align: right;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .delete-link {
            opacity: 0;
            background: none;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            color: #b91c1c;
            transition: 0.2s;
            margin-left: 8px;
        }
        .link-item:hover .delete-link {
            opacity: 1;
        }

        /* 弹窗样式 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 28px;
            padding: 1.8rem;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.2);
        }
        .modal-content h3 {
            margin-bottom: 1rem;
        }
        .modal-content input, .modal-content select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 40px;
            font-size: 0.9rem;
        }
        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 1rem;
        }
        .footer {
            text-align: center;
            margin-top: 2rem;
            padding: 0.6rem;
            font-size: 0.75rem;
            color: #2c5a6e;
            background: rgba(255,255,240,0.4);
            backdrop-filter: blur(4px);
            border-radius: 40px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }
        @media (max-width: 720px) {
            body { padding: 1rem; }
            .link-url { display: none; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="sub">⚡ 常用网站 · 清爽直达</div>
    </div>

    <div class="toolbar">
        <div class="search-box">
            <span>🔍</span>
            <input type="text" id="searchInput" placeholder="搜索网站名称或网址...">
        </div>
        <button class="btn btn-add" id="openAddLinkBtn">➕ 添加链接</button>
        <button class="btn btn-add" id="openAddCategoryBtn">📁 添加分类</button>
    </div>

    <div id="cardsContainer" class="grid"></div>
    <div class="footer">🧭 导航地图 · 收藏即捷径</div>
</div>

<!-- 添加链接弹窗 -->
<div id="addLinkModal" class="modal">
    <div class="modal-content">
        <h3>➕ 添加新链接</h3>
        <input type="text" id="linkName" placeholder="网站名称 (例如: 哔哩哔哩)">
        <input type="text" id="linkUrl" placeholder="网址 (例如: https://bilibili.com)">
        <select id="linkCategorySelect"></select>
        <div class="modal-buttons">
            <button class="btn" id="closeLinkModalBtn">取消</button>
            <button class="btn btn-add" id="saveLinkBtn">保存</button>
        </div>
    </div>
</div>

<!-- 添加分类弹窗 -->
<div id="addCategoryModal" class="modal">
    <div class="modal-content">
        <h3>📁 添加新分类</h3>
        <input type="text" id="categoryName" placeholder="分类名称 (例如: 音乐、工具)">
        <div class="modal-buttons">
            <button class="btn" id="closeCategoryModalBtn">取消</button>
            <button class="btn btn-add" id="saveCategoryBtn">创建</button>
        </div>
    </div>
</div>

<script>
    // ---------- 默认数据 ----------
    const DEFAULT_CATEGORIES = {
        "网盘": [
            { name: "百度网盘", url: "https://pan.baidu.com", icon: "📀" },
            { name: "阿里云盘", url: "https://www.aliyundrive.com", icon: "☁️" },
            { name: "腾讯微云", url: "https://www.weiyun.com", icon: "🐧" },
            { name: "夸克网盘", url: "https://pan.quark.cn", icon: "⚛️" },
            { name: "迅雷云盘", url: "https://pan.xunlei.com", icon: "⚡" },
            { name: "123云盘", url: "https://www.123pan.com", icon: "🔢" }
        ],
        "邮箱": [
            { name: "QQ邮箱", url: "https://mail.qq.com", icon: "📧" },
            { name: "163邮箱", url: "https://mail.163.com", icon: "📬" },
            { name: "Outlook邮箱", url: "https://outlook.live.com", icon: "🌐" }
        ],
        "社交": [
            { name: "微信", url: "https://weixin.qq.com", icon: "💬" },
            { name: "QQ", url: "https://im.qq.com", icon: "🐧" },
            { name: "微博", url: "https://weibo.com", icon: "📱" },
            { name: "小红书", url: "https://www.xiaohongshu.com", icon: "📕" }
        ],
        "国际社交": [
            { name: "YouTube", url: "https://www.youtube.com", icon: "📺" },
            { name: "Instagram", url: "https://www.instagram.com", icon: "📷" },
            { name: "X (Twitter)", url: "https://twitter.com", icon: "🐦" },
            { name: "TikTok", url: "https://www.tiktok.com", icon: "🎵" }
        ],
        "浏览器": [
            { name: "Chrome", url: "https://www.google.cn/chrome/", icon: "🌐" },
            { name: "Edge", url: "https://www.microsoft.com/zh-cn/edge", icon: "🔷" },
            { name: "Firefox", url: "https://www.mozilla.org/zh-CN/firefox/", icon: "🦊" },
            { name: "QQ浏览器", url: "https://browser.qq.com", icon: "🐧" },
            { name: "360极速浏览器", url: "https://browser.360.cn/ee/", icon: "🛡️" },
            { name: "搜狗浏览器", url: "https://ie.sogou.com", icon: "🔍" },
            { name: "Safari", url: "https://www.apple.com/safari/", icon: "🍏" }
        ],
        "地图": [
            { name: "百度地图", url: "https://map.baidu.com", icon: "📍" },
            { name: "高德地图", url: "https://ditu.amap.com", icon: "🗺️" },
            { name: "腾讯地图", url: "https://map.qq.com", icon: "🧭" }
        ],
        "其他": [
            { name: "阿里巴巴图标库", url: "https://www.iconfont.cn", icon: "✨" }
        ]
    };

    const STORAGE_KEY = "myNavLinks";
    const COLLAPSE_STORAGE_KEY = "navCollapseState";
    let categoriesData = {};
    let collapseState = {};

    // ---------- 分类边框颜色映射 ----------
    // 为每个常见分类分配一个独特的亮色（边框颜色）
    const categoryColorMap = {
        "网盘": "#3b82f6",      // 蓝色
        "邮箱": "#f97316",      // 橙色
        "社交": "#10b981",      // 翠绿
        "国际社交": "#8b5cf6",  // 紫色
        "浏览器": "#06b6d4",    // 青色
        "地图": "#ef4444",      // 红色
        "其他": "#9ca3af",      // 灰色
        "常用工具": "#ec4899"   // 粉红色（示例，可自行添加更多）
    };

    // 对于未预定义的新分类，根据名称生成一个稳定的颜色（HSL方式）
    function getCategoryColor(catName) {
        if (categoryColorMap[catName]) return categoryColorMap[catName];
        // 简单哈希生成色相
        let hash = 0;
        for (let i = 0; i < catName.length; i++) {
            hash = catName.charCodeAt(i) + ((hash << 5) - hash);
        }
        const hue = Math.abs(hash % 360);
        return `hsl(${hue}, 70%, 55%)`;
    }

    function loadData() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
            categoriesData = JSON.parse(stored);
            for (let cat in DEFAULT_CATEGORIES) {
                if (!categoriesData[cat]) categoriesData[cat] = [];
            }
        } else {
            categoriesData = JSON.parse(JSON.stringify(DEFAULT_CATEGORIES));
        }
        const savedCollapse = localStorage.getItem(COLLAPSE_STORAGE_KEY);
        if (savedCollapse) {
            collapseState = JSON.parse(savedCollapse);
        } else {
            collapseState = {};
        }
    }

    function saveData() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(categoriesData));
    }

    function saveCollapseState() {
        localStorage.setItem(COLLAPSE_STORAGE_KEY, JSON.stringify(collapseState));
    }

    function toggleCategory(catName) {
        if (collapseState[catName]) {
            delete collapseState[catName];
        } else {
            collapseState[catName] = true;
        }
        saveCollapseState();
        renderAllCards(document.getElementById("searchInput").value);
    }

    function resetToDefault() {
        categoriesData = JSON.parse(JSON.stringify(DEFAULT_CATEGORIES));
        saveData();
        collapseState = {};
        saveCollapseState();
        renderAllCards("");
    }

    function addLink(name, url, category) {
        if (!name || !url) return false;
        if (!url.startsWith("http")) url = "https://" + url;
        const newLink = { name: name, url: url, icon: "🔗" };
        if (!categoriesData[category]) categoriesData[category] = [];
        categoriesData[category].push(newLink);
        saveData();
        return true;
    }

    function deleteLink(category, index) {
        if (categoriesData[category] && categoriesData[category][index]) {
            categoriesData[category].splice(index, 1);
            saveData();
            renderAllCards(document.getElementById("searchInput").value);
        }
    }

    function deleteCategory(category) {
        if (confirm(`确定要删除分类“${category}”及其所有链接吗？`)) {
            delete categoriesData[category];
            delete collapseState[category];
            saveCollapseState();
            saveData();
            renderAllCards(document.getElementById("searchInput").value);
        }
    }

    function addCategory(catName) {
        catName = catName.trim();
        if (!catName) return false;
        if (categoriesData[catName]) {
            alert("分类已存在！");
            return false;
        }
        categoriesData[catName] = [];
        saveData();
        return true;
    }

    function renderAllCards(searchKeyword) {
        const container = document.getElementById("cardsContainer");
        container.innerHTML = "";
        const keyword = (searchKeyword || "").trim().toLowerCase();
        
        for (let catName in categoriesData) {
            let links = categoriesData[catName];
            if (!links) continue;
            let filteredLinks = links;
            if (keyword) {
                filteredLinks = links.filter(link => 
                    link.name.toLowerCase().includes(keyword) || 
                    link.url.toLowerCase().includes(keyword)
                );
            }
            if (filteredLinks.length === 0 && keyword !== "") continue;
            
            const isCollapsed = !!collapseState[catName];
            const collapseIcon = isCollapsed ? "▶" : "▼";
            const borderColor = getCategoryColor(catName);
            
            const card = document.createElement("div");
            card.className = "card";
            // 动态设置左右边框颜色（保留原有border，仅覆盖颜色和宽度）
            card.style.borderLeftColor = borderColor;
            card.style.borderRightColor = borderColor;
            card.style.borderLeftWidth = "4px";
            card.style.borderRightWidth = "2px";
            
            card.innerHTML = `
                <div class="card-header" data-category="${catName}">
                    <div>
                        <span class="collapse-icon">${collapseIcon}</span>
                        <span>${getCategoryIcon(catName)} ${catName}</span>
                    </div>
                    <div>
                        <span class="badge">${filteredLinks.length}个链接</span>
                        <button class="delete-category" data-category="${catName}" title="删除分类">🗑️</button>
                    </div>
                </div>
                <div class="link-list ${isCollapsed ? 'collapsed' : ''}" data-category="${catName}"></div>
            `;
            const linkListDiv = card.querySelector(".link-list");
            filteredLinks.forEach((link, idx) => {
                const originalIndex = links.findIndex(l => l.name === link.name && l.url === link.url);
                const linkDiv = document.createElement("a");
                linkDiv.className = "link-item";
                linkDiv.href = link.url;
                linkDiv.target = "_blank";
                linkDiv.rel = "noopener noreferrer";
                linkDiv.innerHTML = `
                    <span class="link-icon">${link.icon || "🔗"}</span>
                    <span class="link-name">${escapeHtml(link.name)}</span>
                    <span class="link-url">${escapeHtml(link.url.replace(/^https?:\/\//, ''))}</span>
                    <button class="delete-link" data-category="${catName}" data-index="${originalIndex}" onclick="event.preventDefault(); event.stopPropagation(); deleteLink('${catName}', ${originalIndex}); return false;">🗑️</button>
                `;
                linkListDiv.appendChild(linkDiv);
            });
            container.appendChild(card);
            
            // 绑定折叠事件
            const header = card.querySelector(".card-header");
            header.addEventListener("click", (e) => {
                if (e.target.classList.contains("delete-category")) return;
                toggleCategory(catName);
            });
            // 绑定删除分类按钮
            const delCatBtn = card.querySelector(".delete-category");
            delCatBtn.addEventListener("click", (e) => {
                e.stopPropagation();
                deleteCategory(catName);
            });
        }
        if (container.children.length === 0 && keyword !== "") {
            container.innerHTML = "<div style='text-align:center; padding:2rem; background:rgba(255,255,255,0.6); border-radius:30px;'>😢 没有找到相关链接</div>";
        }
    }

    function getCategoryIcon(catName) {
        const map = {
            "网盘": "☁️", "邮箱": "📧", "社交": "💬", "国际社交": "🌍",
            "浏览器": "🌐", "地图": "🗺️", "其他": "📌"
        };
        return map[catName] || "📂";
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function refreshCategorySelect() {
        const select = document.getElementById("linkCategorySelect");
        select.innerHTML = "";
        for (let cat in categoriesData) {
            const option = document.createElement("option");
            option.value = cat;
            option.textContent = cat;
            select.appendChild(option);
        }
    }

    function initSearch() {
        const input = document.getElementById("searchInput");
        input.addEventListener("input", (e) => {
            renderAllCards(e.target.value);
        });
    }

    let addLinkModal = null;
    function initAddLinkModal() {
        addLinkModal = document.getElementById("addLinkModal");
        const openBtn = document.getElementById("openAddLinkBtn");
        const closeBtn = document.getElementById("closeLinkModalBtn");
        const saveBtn = document.getElementById("saveLinkBtn");
        openBtn.onclick = () => {
            refreshCategorySelect();
            addLinkModal.style.display = "flex";
        };
        closeBtn.onclick = () => { addLinkModal.style.display = "none"; };
        saveBtn.onclick = () => {
            const name = document.getElementById("linkName").value.trim();
            let url = document.getElementById("linkUrl").value.trim();
            const category = document.getElementById("linkCategorySelect").value;
            if (!name || !url) {
                alert("请填写名称和网址");
                return;
            }
            if (addLink(name, url, category)) {
                addLinkModal.style.display = "none";
                document.getElementById("linkName").value = "";
                document.getElementById("linkUrl").value = "";
                renderAllCards(document.getElementById("searchInput").value);
            } else {
                alert("添加失败");
            }
        };
    }

    let addCategoryModal = null;
    function initAddCategoryModal() {
        addCategoryModal = document.getElementById("addCategoryModal");
        const openBtn = document.getElementById("openAddCategoryBtn");
        const closeBtn = document.getElementById("closeCategoryModalBtn");
        const saveBtn = document.getElementById("saveCategoryBtn");
        openBtn.onclick = () => {
            addCategoryModal.style.display = "flex";
        };
        closeBtn.onclick = () => { addCategoryModal.style.display = "none"; };
        saveBtn.onclick = () => {
            const catName = document.getElementById("categoryName").value.trim();
            if (!catName) {
                alert("请输入分类名称");
                return;
            }
            if (addCategory(catName)) {
                addCategoryModal.style.display = "none";
                document.getElementById("categoryName").value = "";
                renderAllCards(document.getElementById("searchInput").value);
            } else {
                alert("分类已存在或名称无效");
            }
        };
    }

    function init() {
        loadData();
        initSearch();
        initAddLinkModal();
        initAddCategoryModal();
        renderAllCards("");
        window.onclick = (e) => {
            if (e.target === addLinkModal) addLinkModal.style.display = "none";
            if (e.target === addCategoryModal) addCategoryModal.style.display = "none";
        };
    }

    init();
</script>
</body>
</html>
