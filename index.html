<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>我的宝藏收藏 · 深色模式版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.3s, color 0.3s, border-color 0.3s, box-shadow 0.3s;
        }

        /* 浅色模式（默认） */
        :root {
            --bg-color: #f0f2f5;
            --card-bg: rgba(255,255,255,0.92);
            --card-bg-hover: rgba(255,255,255,0.96);
            --text-color: #1f2937;
            --text-secondary: #6b7280;
            --border-light: #e2e8f0;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-hover: 0 8px 20px rgba(0,0,0,0.12);
            --input-bg: rgba(255,255,255,0.9);
            --footer-border: rgba(255,255,255,0.3);
            --footer-text: #ffffff;
            --toolbar-btn-hover: rgba(0,0,0,0.05);
        }

        /* 深色模式 */
        body.dark {
            --bg-color: #1a1a2e;
            --card-bg: rgba(30,30,46,0.92);
            --card-bg-hover: rgba(40,40,56,0.96);
            --text-color: #e2e8f0;
            --text-secondary: #9ca3af;
            --border-light: #334155;
            --shadow: 0 4px 12px rgba(0,0,0,0.3);
            --shadow-hover: 0 8px 20px rgba(0,0,0,0.4);
            --input-bg: rgba(30,30,46,0.9);
            --footer-border: rgba(255,255,255,0.1);
            --footer-text: #94a3b8;
            --toolbar-btn-hover: rgba(255,255,255,0.1);
        }

        body {
            background: url('bg.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            padding: 40px 20px;
            color: var(--text-color);
        }

        /* 深色模式下的背景覆盖层 */
        body.dark::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: -1;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 600;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6, #06b6d4);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .header p {
            color: var(--footer-text);
            font-size: 0.9rem;
            margin-top: 6px;
        }

        /* 顶部工具栏 */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .search-box {
            flex: 1;
            max-width: 400px;
        }

        .search-box input {
            width: 100%;
            padding: 10px 18px;
            border: 1px solid var(--border-light);
            border-radius: 40px;
            font-size: 0.9rem;
            outline: none;
            background: var(--input-bg);
            color: var(--text-color);
        }

        .search-box input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59,130,246,0.2);
        }

        .toolbar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .toolbar button {
            padding: 8px 18px;
            border: none;
            border-radius: 30px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .btn-add-cat { background: #8b5cf6; color: white; }
        .btn-add-cat:hover { background: #7c3aed; }
        .btn-add { background: #3b82f6; color: white; }
        .btn-add:hover { background: #2563eb; }
        .btn-refresh { background: #6b7280; color: white; }
        .btn-refresh:hover { background: #4b5563; }

        /* 深色模式切换按钮 */
        .theme-toggle {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-light);
            border-radius: 40px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-color);
            transition: all 0.2s;
        }
        .theme-toggle:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.02);
        }

        .categories-container {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .category {
            border-radius: 20px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
            transition: all 0.2s;
            background: var(--card-bg);
            backdrop-filter: blur(2px);
            overflow: hidden;
            cursor: grab;
            border-left-width: 6px;
            border-left-style: solid;
            border-right-width: 3px;
            border-right-style: solid;
        }

        .category:active { cursor: grabbing; }
        .category.dragging { opacity: 0.5; cursor: grabbing; }
        .category.drag-over { transform: translateY(4px); box-shadow: var(--shadow-hover); }
        .category:hover { transform: translateY(-2px); box-shadow: var(--shadow-hover); }

        .category-header {
            padding: 18px 22px;
            cursor: grab;
            user-select: none;
            transition: background 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .category-header:active { cursor: grabbing; }
        .category-header:hover { background: var(--toolbar-btn-hover); }

        .category-header h2 {
            font-size: 1.2rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .drag-handle { cursor: grab; font-size: 1.2rem; color: var(--text-secondary); margin-right: 8px; }
        .drag-handle:active { cursor: grabbing; }

        .toggle-icon {
            font-size: 1.2rem;
            transition: transform 0.3s;
            color: var(--text-secondary);
            cursor: pointer;
        }
        .category.collapsed .toggle-icon { transform: rotate(-90deg); }
        .category.collapsed .category-content { display: none; }

        .category-content { padding: 0 22px 18px 22px; }

        .cat-actions { display: flex; gap: 8px; }
        .cat-actions button {
            background: rgba(0,0,0,0.05);
            border: none;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--text-color);
        }
        .cat-actions button:hover { background: rgba(0,0,0,0.1); }

        .link-list { display: flex; flex-direction: column; gap: 6px; }
        .link-item {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            border-radius: 12px;
            background: rgba(255,255,255,0.5);
            text-decoration: none;
            color: var(--text-color);
            transition: all 0.2s;
            cursor: pointer;
        }
        body.dark .link-item {
            background: rgba(50,50,70,0.5);
        }
        .link-item:hover { background: var(--card-bg-hover); transform: translateX(4px); }
        .link-icon { font-size: 1.1rem; margin-right: 10px; width: 24px; text-align: center; }
        .link-name { flex: 1; font-size: 0.9rem; font-weight: 500; }
        .link-url { font-size: 0.7rem; color: var(--text-secondary); font-family: monospace; margin-right: 12px; }
        .click-count {
            font-size: 0.65rem;
            background: rgba(0,0,0,0.05);
            padding: 2px 6px;
            border-radius: 20px;
            margin-right: 8px;
            color: var(--text-secondary);
            white-space: nowrap;
        }
        .link-actions { display: flex; gap: 6px; }
        .link-actions button { background: none; border: none; cursor: pointer; font-size: 0.8rem; padding: 4px 8px; border-radius: 20px; }
        .btn-edit { color: #3b82f6; }
        .btn-edit:hover { background: #dbeafe; }
        .btn-del { color: #ef4444; }
        .btn-del:hover { background: #fee2e2; }

        .donation-section {
            margin-top: 40px;
            text-align: center;
        }
        .donation-btn {
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .donation-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .donation-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .donation-modal-content {
            background: white;
            border-radius: 28px;
            padding: 30px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            position: relative;
        }
        body.dark .donation-modal-content {
            background: #1e1e2e;
            color: #e2e8f0;
        }
        .donation-modal-content h3 { margin-bottom: 20px; font-size: 1.5rem; }
        .donation-modal-content .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 1.5rem;
            cursor: pointer;
            color: #9ca3af;
        }
        .donation-modal-content .close-btn:hover { color: #374151; }
        .donation-modal-content .tip { color: #6b7280; font-size: 0.8rem; margin-top: 15px; }
        .pay-buttons { display: flex; gap: 15px; justify-content: center; margin: 20px 0; }
        .pay-btn { padding: 10px 20px; border: none; border-radius: 30px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
        .pay-btn.wechat { background: #07c160; color: white; }
        .pay-btn.alipay { background: #1677ff; color: white; }
        .pay-btn.wechat:hover { background: #06ad56; }
        .pay-btn.alipay:hover { background: #0d66dd; }
        .qrcode {
            margin: 20px auto;
            width: 200px;
            height: 200px;
            background: #f3f4f6;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            color: #9ca3af;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 28px;
            padding: 28px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
        }
        body.dark .modal-content {
            background: #1e1e2e;
            color: #e2e8f0;
        }
        .modal-content h3 { margin-bottom: 20px; }
        .modal-content input, .modal-content select {
            width: 100%;
            padding: 12px;
            margin-bottom: 16px;
            border: 1px solid #ddd;
            border-radius: 16px;
            background: var(--input-bg);
            color: var(--text-color);
        }
        .modal-buttons { display: flex; gap: 12px; justify-content: flex-end; }
        .modal-buttons button { padding: 8px 18px; border: none; border-radius: 30px; cursor: pointer; }

        .loading { text-align: center; padding: 60px; color: var(--text-secondary); }
        .footer { text-align: center; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--footer-border); color: var(--footer-text); font-size: 0.7rem; }

        @media (max-width: 640px) {
            body { padding: 20px 12px; }
            .link-url { display: none; }
            .click-count { display: none; }
            .category-header { padding: 14px 16px; }
            .category-content { padding: 0 16px 14px 16px; }
            .top-bar { flex-direction: column; align-items: stretch; }
            .search-box { max-width: 100%; }
            .toolbar { justify-content: center; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>⭐ 我的宝藏收藏</h1>
        <p>云端同步 · 拖拽排序 · 点击次数统计</p>
    </div>

    <div class="top-bar">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 搜索链接名称或网址..." onkeyup="filterLinks()">
        </div>
        <div class="toolbar">
            <button class="btn-refresh" onclick="loadData()">🔄 刷新</button>
            <button class="btn-add-cat" onclick="openAddCategory()">📁 分类</button>
            <button class="btn-add" onclick="openAddLink()">➕ 链接</button>
            <button class="theme-toggle" onclick="toggleTheme()">🌙 深色模式</button>
        </div>
    </div>

    <div id="categoriesContainer" class="categories-container"><div class="loading">加载中...</div></div>

    <div class="donation-section">
        <button class="donation-btn" onclick="openDonation()">☕ 请我喝杯咖啡</button>
    </div>

    <div class="footer">
        ✨ 按住分类标题左侧 ⋮⋮ 图标拖拽排序 · 点击右上角切换深色模式
    </div>
</div>

<div id="donationModal" class="donation-modal">
    <div class="donation-modal-content">
        <span class="close-btn" onclick="closeDonation()">&times;</span>
        <h3>☕ 请我喝杯咖啡</h3>
        <p style="color:#6b7280; margin-bottom:10px;">如果这个导航页对你有帮助，欢迎打赏支持~</p>
        <div class="pay-buttons">
            <button class="pay-btn wechat" onclick="showWechatQR()">微信支付</button>
            <button class="pay-btn alipay" onclick="showAlipayQR()">支付宝</button>
        </div>
        <div id="qrcodeArea" class="qrcode"><span>请选择支付方式</span></div>
        <div class="tip">💡 打赏金额随意，感谢支持！</div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://wsdjhroznnezwwhrbrrz.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_7y7mm2gKgOG1jhAEAqtnHw_ci6aWeM1';

    let categories = [];
    let linksData = {};
    let clickCounts = {};
    let modalType = '';
    let editOldCat = '';
    let editLinkCat = '';
    let editLinkIdx = -1;
    let collapsedState = {};

    // 深色模式状态
    function initTheme() {
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.body.classList.add('dark');
            document.querySelector('.theme-toggle').innerHTML = '☀️ 浅色模式';
        } else {
            document.body.classList.remove('dark');
            document.querySelector('.theme-toggle').innerHTML = '🌙 深色模式';
        }
    }

    function toggleTheme() {
        if (document.body.classList.contains('dark')) {
            document.body.classList.remove('dark');
            localStorage.setItem('theme', 'light');
            document.querySelector('.theme-toggle').innerHTML = '🌙 深色模式';
        } else {
            document.body.classList.add('dark');
            localStorage.setItem('theme', 'dark');
            document.querySelector('.theme-toggle').innerHTML = '☀️ 浅色模式';
        }
    }

    const colorList = [
        { border: '#ef4444', title: '#dc2626' },
        { border: '#8b5cf6', title: '#7c3aed' },
        { border: '#3b82f6', title: '#2563eb' },
        { border: '#10b981', title: '#059669' },
        { border: '#f97316', title: '#ea580c' },
        { border: '#06b6d4', title: '#0891b2' },
        { border: '#ec4899', title: '#db2777' },
        { border: '#84cc16', title: '#65a30d' },
        { border: '#f59e0b', title: '#d97706' },
        { border: '#6366f1', title: '#4f46e5' },
        { border: '#14b8a6', title: '#0d9488' },
        { border: '#a855f7', title: '#9333ea' }
    ];

    function getCategoryColor(index) { return colorList[index % colorList.length]; }
    function applyCategoryColor(catDiv, index) {
        const color = getCategoryColor(index);
        catDiv.style.borderLeftColor = color.border;
        catDiv.style.borderRightColor = color.border;
        const h2Element = catDiv.querySelector('.category-header h2');
        if (h2Element) h2Element.style.color = color.title;
    }

    let dragSrcIndex = null;

    function loadCollapsedState() {
        const saved = localStorage.getItem('collapsedCategories');
        if (saved) collapsedState = JSON.parse(saved);
    }
    function saveCollapsedState() { localStorage.setItem('collapsedCategories', JSON.stringify(collapsedState)); }
    function toggleCategory(catName) {
        collapsedState[catName] = !collapsedState[catName];
        saveCollapsedState();
        const catDiv = document.getElementById(`cat-${catName.replace(/[^a-zA-Z0-9\u4e00-\u9fa5]/g, '_')}`);
        if (catDiv) catDiv.classList.toggle('collapsed', collapsedState[catName]);
    }

    function loadClickCounts() {
        const saved = localStorage.getItem('clickCounts');
        if (saved) clickCounts = JSON.parse(saved);
    }
    function saveClickCounts() { localStorage.setItem('clickCounts', JSON.stringify(clickCounts)); }

    function recordClick(catName, linkName, url) {
        const key = `${catName}|${linkName}|${url}`;
        clickCounts[key] = (clickCounts[key] || 0) + 1;
        saveClickCounts();
        window.open(url, '_blank');
        render();
    }

    function getClickCount(catName, linkName, url) {
        const key = `${catName}|${linkName}|${url}`;
        return clickCounts[key] || 0;
    }

    async function autoSave() {
        const toSave = { categories, linksData };
        try {
            const check = await fetch(`${SUPABASE_URL}/rest/v1/nav_data?select=id`, {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
            });
            const existing = await check.json();
            if (existing && existing[0]) {
                await fetch(`${SUPABASE_URL}/rest/v1/nav_data?id=eq.${existing[0].id}`, {
                    method: 'PATCH',
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: toSave })
                });
            } else {
                await fetch(`${SUPABASE_URL}/rest/v1/nav_data`, {
                    method: 'POST',
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: toSave })
                });
            }
            showToast('✓ 已自动保存');
        } catch(e) { console.error(e); }
    }

    function showToast(msg) {
        let toast = document.getElementById('toast');
        if (!toast) {
            toast = document.createElement('div');
            toast.id = 'toast';
            toast.style.cssText = 'position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.7);color:white;padding:8px 20px;border-radius:40px;font-size:14px;z-index:9999;transition:opacity 0.3s';
            document.body.appendChild(toast);
        }
        toast.textContent = msg;
        toast.style.opacity = '1';
        setTimeout(() => toast.style.opacity = '0', 2000);
    }

    async function loadData() {
        const container = document.getElementById('categoriesContainer');
        container.innerHTML = '<div class="loading">加载中...</div>';
        try {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/nav_data?select=*`, {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
            });
            const data = await res.json();
            if (data && data[0] && data[0].data) {
                const navData = data[0].data;
                categories = navData.categories || [];
                linksData = navData.linksData || {};
            } else {
                categories = [];
                linksData = {};
            }
            render();
        } catch(e) { container.innerHTML = '<div class="loading">加载失败</div>'; }
    }

    function handleDragStart(e, index) {
        dragSrcIndex = index;
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', index);
        e.target.classList.add('dragging');
    }

    function handleDragOver(e, index) {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
    }

    function handleDrop(e, index) {
        e.preventDefault();
        if (dragSrcIndex !== null && dragSrcIndex !== index) {
            const draggedItem = categories[dragSrcIndex];
            categories.splice(dragSrcIndex, 1);
            categories.splice(index, 0, draggedItem);
            render();
            autoSave();
            showToast('✓ 分类顺序已保存');
        }
        dragSrcIndex = null;
    }

    function handleDragEnd(e) {
        e.target.classList.remove('dragging');
        dragSrcIndex = null;
    }

    function render() {
        const container = document.getElementById('categoriesContainer');
        container.innerHTML = '';
        for (let i = 0; i < categories.length; i++) {
            const cat = categories[i];
            let links = linksData[cat.name] || [];
            links = [...links].sort((a, b) => {
                const countA = getClickCount(cat.name, a.name, a.url);
                const countB = getClickCount(cat.name, b.name, b.url);
                return countB - countA;
            });
            const isCollapsed = collapsedState[cat.name] || false;
            const catId = `cat-${cat.name.replace(/[^a-zA-Z0-9\u4e00-\u9fa5]/g, '_')}`;
            let linksHtml = '';
            for (let j = 0; j < links.length; j++) {
                const link = links[j];
                const clickCount = getClickCount(cat.name, link.name, link.url);
                linksHtml += `
                    <div class="link-item" onclick="recordClick('${escapeHtml(cat.name)}', '${escapeHtml(link.name)}', '${link.url}')">
                        <span class="link-icon">${link.icon || '🔗'}</span>
                        <span class="link-name">${escapeHtml(link.name)}</span>
                        <span class="link-url">${link.url}</span>
                        ${clickCount > 0 ? `<span class="click-count">📊 ${clickCount}</span>` : ''}
                        <div class="link-actions" onclick="event.stopPropagation()">
                            <button class="btn-edit" onclick="editLink('${escapeHtml(cat.name)}', ${j})">✏️</button>
                            <button class="btn-del" onclick="deleteLink('${escapeHtml(cat.name)}', ${j})">🗑️</button>
                        </div>
                    </div>
                `;
            }
            if (links.length === 0) linksHtml = '<div style="padding:12px; color:var(--text-secondary);">暂无链接，点击➕添加</div>';
            container.innerHTML += `
                <div class="category ${isCollapsed ? 'collapsed' : ''}" 
                     id="${catId}"
                     draggable="true"
                     ondragstart="handleDragStart(event, ${i})"
                     ondragover="handleDragOver(event, ${i})"
                     ondrop="handleDrop(event, ${i})"
                     ondragend="handleDragEnd(event)">
                    <div class="category-header">
                        <h2>
                            <span class="drag-handle" draggable="false">⋮⋮</span>
                            <span>${cat.icon} ${escapeHtml(cat.name)}</span>
                            <span style="font-size:0.7rem; font-weight:normal;"> 📊 ${links.length}个链接</span>
                        </h2>
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <span class="toggle-icon" onclick="event.stopPropagation(); toggleCategory('${escapeHtml(cat.name)}')">▼</span>
                            <div class="cat-actions" onclick="event.stopPropagation()">
                                <button onclick="renameCategory('${escapeHtml(cat.name)}')">✏️</button>
                                <button onclick="addLinkToCat('${escapeHtml(cat.name)}')">➕</button>
                                <button onclick="deleteCategory('${escapeHtml(cat.name)}')">🗑️</button>
                            </div>
                        </div>
                    </div>
                    <div class="category-content"><div class="link-list">${linksHtml}</div></div>
                </div>
            `;
        }
        if (categories.length === 0) container.innerHTML = '<div style="text-align:center; padding:60px;">暂无分类，点击「添加分类」开始</div>';
        
        const catDivs = document.querySelectorAll('.category');
        for (let i = 0; i < catDivs.length; i++) applyCategoryColor(catDivs[i], i);
        filterLinks();
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }

    function openDonation() { document.getElementById('donationModal').style.display = 'flex'; }
    function closeDonation() { document.getElementById('donationModal').style.display = 'none'; }
    function showWechatQR() {
        document.getElementById('qrcodeArea').innerHTML = `
            <div style="text-align:center;">
                <div style="background:white; padding:10px; border-radius:16px; display:inline-block;">
                    <div style="width:160px; height:160px; background:#f3f4f6; display:flex; align-items:center; justify-content:center; border-radius:12px;">
                        <span style="color:#9ca3af; font-size:12px;">微信收款码</span>
                    </div>
                </div>
                <p style="margin-top:10px; font-size:12px; color:#07c160;">💚 微信扫码打赏</p>
            </div>
        `;
    }
    function showAlipayQR() {
        document.getElementById('qrcodeArea').innerHTML = `
            <div style="text-align:center;">
                <div style="background:white; padding:10px; border-radius:16px; display:inline-block;">
                    <div style="width:160px; height:160px; background:#f3f4f6; display:flex; align-items:center; justify-content:center; border-radius:12px;">
                        <span style="color:#9ca3af; font-size:12px;">支付宝收款码</span>
                    </div>
                </div>
                <p style="margin-top:10px; font-size:12px; color:#1677ff;">💙 支付宝扫码打赏</p>
            </div>
        `;
    }

    function openAddCategory() { modalType = 'addCategory'; document.getElementById('catName').value = ''; document.getElementById('catIcon').value = '📁'; document.getElementById('categoryModal').style.display = 'flex'; }
    function renameCategory(name) { modalType = 'renameCategory'; editOldCat = name; document.getElementById('catName').value = name; const oldCat = categories.find(c => c.name === name); document.getElementById('catIcon').value = oldCat ? oldCat.icon : '📁'; document.getElementById('categoryModal').style.display = 'flex'; }
    function deleteCategory(name) { if (confirm(`删除「${name}」？`)) { categories = categories.filter(c => c.name !== name); delete linksData[name]; render(); autoSave(); } }
    function confirmCategory() {
        const newName = document.getElementById('catName').value.trim();
        const icon = document.getElementById('catIcon').value.trim() || '📁';
        if (!newName) { alert('请输入名称'); return; }
        if (modalType === 'addCategory') {
            if (categories.some(c => c.name === newName)) { alert('分类已存在'); return; }
            categories.push({ name: newName, icon });
            if (!linksData[newName]) linksData[newName] = [];
        } else {
            if (editOldCat !== newName && categories.some(c => c.name === newName)) { alert('分类已存在'); return; }
            const cat = categories.find(c => c.name === editOldCat);
            if (cat) { cat.name = newName; cat.icon = icon; }
            if (editOldCat !== newName) { linksData[newName] = linksData[editOldCat] || []; delete linksData[editOldCat]; }
        }
        closeModal('categoryModal'); render(); autoSave();
    }
    function openAddLink() { modalType = 'addLink'; document.getElementById('linkName').value = ''; document.getElementById('linkUrl').value = ''; updateCatSelect(); document.getElementById('linkModal').style.display = 'flex'; }
    function addLinkToCat(catName) { modalType = 'addLink'; document.getElementById('linkName').value = ''; document.getElementById('linkUrl').value = ''; updateCatSelect(catName); document.getElementById('linkModal').style.display = 'flex'; }
    function editLink(catName, idx) { const link = linksData[catName][idx]; if (!link) return; modalType = 'editLink'; editLinkCat = catName; editLinkIdx = idx; document.getElementById('linkName').value = link.name; document.getElementById('linkUrl').value = link.url; updateCatSelect(catName); document.getElementById('linkModal').style.display = 'flex'; }
    function deleteLink(catName, idx) { if (confirm('删除此链接？')) { linksData[catName].splice(idx, 1); render(); autoSave(); } }
    function updateCatSelect(selected) { const select = document.getElementById('linkCategory'); let html = ''; for (let i = 0; i < categories.length; i++) { const c = categories[i]; const selectedAttr = (selected === c.name) ? 'selected' : ''; html += `<option value="${escapeHtml(c.name)}" ${selectedAttr}>${c.icon} ${c.name}</option>`; } select.innerHTML = html; if (categories.length === 0) select.innerHTML = '<option value="">请先添加分类</option>'; }
    function confirmLink() {
        const name = document.getElementById('linkName').value.trim();
        let url = document.getElementById('linkUrl').value.trim();
        const catName = document.getElementById('linkCategory').value;
        if (!name || !url) { alert('请填写完整'); return; }
        if (!url.startsWith('http')) url = 'https://' + url;
        if (!catName) { alert('请选择分类'); return; }
        if (modalType === 'addLink') { if (!linksData[catName]) linksData[catName] = []; linksData[catName].push({ name, url, icon: '🔗' }); }
        else {
            if (editLinkCat === catName) linksData[catName][editLinkIdx] = { name, url, icon: '🔗' };
            else { linksData[editLinkCat].splice(editLinkIdx, 1); if (!linksData[catName]) linksData[catName] = []; linksData[catName].push({ name, url, icon: '🔗' }); }
        }
        closeModal('linkModal'); render(); autoSave();
    }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function filterLinks() {
        const kw = document.getElementById('searchInput').value.toLowerCase();
        const cats = document.querySelectorAll('.category');
        for (let i = 0; i < cats.length; i++) {
            const cat = cats[i];
            const items = cat.querySelectorAll('.link-item');
            let hasVisible = false;
            for (let j = 0; j < items.length; j++) {
                const text = items[j].innerText.toLowerCase();
                if (kw === '' || text.includes(kw)) { items[j].style.display = 'flex'; hasVisible = true; }
                else items[j].style.display = 'none';
            }
            cat.style.display = (kw === '' || hasVisible) ? 'block' : 'none';
        }
    }
    window.onclick = e => { if (e.target.classList?.contains('modal')) e.target.style.display = 'none'; };

    initTheme();
    loadCollapsedState();
    loadClickCounts();
    loadData();
</script>

<div id="linkModal" class="modal">
    <div class="modal-content"><h3 id="linkModalTitle">添加链接</h3><input type="text" id="linkName" placeholder="链接名称"><input type="text" id="linkUrl" placeholder="网址"><select id="linkCategory"></select><div class="modal-buttons"><button onclick="closeModal('linkModal')">取消</button><button onclick="confirmLink()">确认</button></div></div>
</div>
<div id="categoryModal" class="modal">
    <div class="modal-content"><h3 id="modalTitle">添加分类</h3><input type="text" id="catName" placeholder="分类名称"><input type="text" id="catIcon" placeholder="图标" value="📁"><div class="modal-buttons"><button onclick="closeModal('categoryModal')">取消</button><button onclick="confirmCategory()">确认</button></div></div>
</div>
</body>
</html>
